<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
body{margin:0;}
.card{
  width:1200px;height:630px;box-sizing:border-box;
  background:#F7F3EC;
  background-image:radial-gradient(rgba(26,22,18,0.04) 1px, transparent 1px);
  background-size:28px 28px;
  display:flex;flex-direction:column;justify-content:center;
  padding:0 100px;position:relative;
}
.brand{font-family:'DM Mono',monospace;font-size:22px;letter-spacing:0.1em;text-transform:uppercase;color:#1A1612;margin-bottom:40px;}
.brand span{color:#4E8A5C;}
h1{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:76px;line-height:1.1;color:#1A1612;margin:0 0 32px;max-width:20ch;}
h1 em{font-style:italic;font-weight:600;color:#4E8A5C;}
p{font-family:'DM Mono',monospace;font-size:20px;color:#5A544A;letter-spacing:0.04em;margin:0;}
.bar{position:absolute;top:0;left:0;height:8px;width:100%;background:linear-gradient(90deg,#4E8A5C,#3E5243);}
</style>
</head>
<body>
<div class="card">
  <div class="bar"></div>
  <div class="brand">Good <span>Systems</span></div>
  <h1>The tech studio for <em>impact funders</em></h1>
  <p>AI strategy · Tech systems · Team training</p>
</div>
</body>
</html>
